site_name: FitTrack Docs
site_description: Documentación oficial del proyecto FitTrack
site_author: Alejandro
# En GitHub Actions se sustituye por la URL real del repositorio en Pages.
site_url: https://__GITHUB_PAGES_BASE_URL__/
theme:
  name: material

nav:
  - Introducción: index.md
  - 02 MVP y visión funcional:
      - MVP y flujo principal: 02-mvp-vision-funcional/mvp-y-vision-funcional.md
  - 03 Frontend:
      - Arquitectura y evidencias: 03-frontend/frontend.md
  - 04 Backend:
      - API, validaciones y modelo de datos: 04-backend/backend.md
  - 05 Despliegue:
      - Docker, entornos y CI/CD: 05-despliegue/despliegue.md
  - 06 DOR:
      - Diseño y experiencia: 06-dor/dor.md
  - 07 IPW:
      - Mercado y propuesta: 07-ipw/ipw.md
  - 08 SOJ:
      - ODS e impacto: 08-soj/soj.md
  - 09 SSG:
      - Gestión y aplicabilidad real: 09-ssg/ssg.md
  - 10 Conclusión:
      - Cierre y próximos pasos: 10-conclusion/conclusion.md
  - Anexos técnicos (legado):
      - Arquitectura (original): arquitectura.md
      - Requisitos (original): requisitos.md
      - Decisiones técnicas (original): decisiones.md
      - MVP global (original): mvp.md
      - MVP Frontend (original): frontend-mvp.md
      - DEW Frontend (original): dew-frontend.md
      - Auditoría DEW (original): auditoria-dew-fit-track.md
      - Backend API (original): backend-api.md
      - Backend BD (original): backend-bd.md
      - Estado actual (original): estado-actual.md
      - Despliegue (original): despliegue.md
      - Guion presentación (original): presentacion-guion.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
