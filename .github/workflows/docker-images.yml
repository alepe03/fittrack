name: Build and push Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}/fittrack
    steps:
      - uses: actions/checkout@v4

      - name: Normalizar namespace en minúsculas
        run: echo "IMAGE_NAMESPACE=${IMAGE_NAMESPACE,,}" >> "$GITHUB_ENV"

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-backend:${{ github.sha }}

      - name: Build y push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/front/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-front:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-front:${{ github.sha }}
